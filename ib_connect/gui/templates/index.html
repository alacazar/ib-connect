<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IB Data Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/solar/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Left Panel: Contract Search -->
            <div class="col-2" style="font-size: 12px;">
                <h4>Contract Search</h4>
                <form id="queryForm">
                    <div class="mb-2">
                        <label>Symbol</label>
                        <input type="text" class="form-control form-control-sm" name="symbol" placeholder="Required if ConId not provided" oninput="this.value = this.value.toUpperCase()">
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm mb-2" style="width: 100%;">Query</button>
                    <div class="mb-2">
                        <label>ConId</label>
                        <input type="number" class="form-control form-control-sm" name="conid" placeholder="Required if Symbol not provided">
                    </div>
                    <div class="mb-2">
                        <label>Security Type *</label>
                        <select class="form-control form-control-sm" name="sec_type" onchange="toggleFields()">
                            <option value="STK">STK</option>
                            <option value="FUT">FUT</option>
                            <option value="OPT">OPT</option>
                            <option value="CASH">CASH</option>
                            <option value="CFD">CFD</option>
                            <option value="BOND">BOND</option>
                            <option value="FOP">FOP</option>
                            <option value="WAR">WAR</option>
                            <option value="IOPT">IOPT</option>
                            <option value="CMDTY">CMDTY</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Exchange</label>
                        <input type="text" class="form-control form-control-sm" name="exchange" value="SMART" oninput="this.value = this.value.toUpperCase()">
                    </div>
                    <div class="mb-2">
                        <label>Currency</label>
                        <input type="text" class="form-control form-control-sm" name="currency" value="USD">
                    </div>
                    <div class="mb-2">
                        <label>Expiry (YYYYMMDD)</label>
                        <input type="text" class="form-control form-control-sm" name="expiry" id="expiryField" disabled>
                    </div>
                    <div class="mb-2">
                        <label>Strike</label>
                        <input type="text" class="form-control form-control-sm" name="strike" id="strikeField" placeholder="Optional" disabled>
                    </div>
                    <div class="mb-2">
                        <label>Right</label>
                        <select class="form-control form-control-sm" name="right" id="rightField" disabled>
                            <option value="">None</option>
                            <option value="PUT">PUT</option>
                            <option value="CALL">CALL</option>
                        </select>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" name="include_expired">
                        <label class="form-check-label">Include Expired</label>
                    </div>
                </form>
            </div>

            <!-- Middle Panel: Results Grid -->
            <div class="col-7" id="resultsPanel">
                <h4>Results</h4>
                <button id="deleteSelected" class="btn btn-danger mb-2">Delete Selected</button>
                <button id="saveContracts" class="btn btn-success mb-2">Save Contracts</button>
                <button id="downloadData" class="btn btn-warning mb-2">Download Data</button>
                <div id="tableContainer" style="overflow-x: auto;">
                <table id="resultsTable" class="table table-striped table-hover table-sm">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAllCheckbox"></th>
                            <th>Symbol</th>
                            <th>ConId</th>
                            <th>Ticker</th>
                            <th>Exchange</th>
                            <th>Currency</th>
                            <th>Type</th>
                            <th>Expiry</th>
                            <th>Strike</th>
                            <th>Right</th>
                            <th>Multiplier</th>
                            <th>Parent</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                </div>
            </div>

            <!-- Right Panel: Progress -->
            <div class="col-3">
                <h4>Download Jobs</h4>
                <div id="progressArea"></div>
            </div>
        </div>
    </div>

    <!-- Download Modal -->
    <div class="modal fade" id="downloadModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Download Data</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label>Download Period</label>
                        <div class="row">
                            <div class="col-auto">
                                <input type="number" class="form-control" id="periodNumber" value="1" min="1">
                            </div>
                            <div class="col-auto">
                                <select class="form-control" id="periodUnit">
                                    <option value="days">Days</option>
                                    <option value="weeks">Weeks</option>
                                    <option value="months">Months</option>
                                    <option value="years">Years</option>
                                </select>
                            </div>
                            <div class="col-auto">
                                <button class="btn btn-secondary" id="setPeriod">Set</button>
                            </div>
                        </div>
                    </div>
                    <div id="downloadList">
                        <!-- Contracts will be added here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="startDownload">Download</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleFields() {
            const secType = document.querySelector('select[name="sec_type"]').value;
            const derivatives = ['FUT', 'OPT', 'FOP', 'IOPT', 'WAR'];
            const options = ['OPT', 'FOP', 'IOPT', 'WAR'];
            document.getElementById('expiryField').disabled = !derivatives.includes(secType);
            document.getElementById('strikeField').disabled = !options.includes(secType);
            document.getElementById('rightField').disabled = !options.includes(secType);
        }
        toggleFields(); // Initialize on load

        // Align grid header with query button
        window.addEventListener('load', () => {
            const btn = document.querySelector('#queryForm button[type="submit"]');
            const tableContainer = document.getElementById('tableContainer');
            if (btn && tableContainer) {
                const btnTop = btn.getBoundingClientRect().top;
                const containerTop = tableContainer.getBoundingClientRect().top;
                tableContainer.style.marginTop = (btnTop - containerTop) + 'px';
            }
        });

        // Make table sortable
        document.querySelectorAll('#resultsTable th').forEach((th, index) => {
            th.style.cursor = 'pointer';
            th.addEventListener('click', () => {
                const table = th.closest('table');
                const tbody = table.querySelector('tbody');
                const rows = Array.from(tbody.querySelectorAll('tr'));
                const isNumeric = ['ConId', 'Strike', 'Multiplier', 'Parent'].includes(th.textContent.trim());
                rows.sort((a, b) => {
                    const aVal = a.cells[index].textContent.trim();
                    const bVal = b.cells[index].textContent.trim();
                    if (isNumeric) {
                        return parseFloat(aVal) - parseFloat(bVal);
                    } else {
                        return aVal.localeCompare(bVal);
                    }
                });
                rows.forEach(row => tbody.appendChild(row));
            });
        });

        // Make columns resizable
        document.querySelectorAll('#resultsTable th').forEach(th => {
            th.style.resize = 'horizontal';
            th.style.overflow = 'auto';
        });
    </script>
    <script>
        let selectedContracts = [];
        let activeJobs = [];
        let jobDetails = {}; // job_key -> {contract, start_date, end_date, bar_size, submission_time, start_time, completion_time}
        let expandedJobs = new Set(); // Set of expanded job_keys

        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            if (!data.symbol && !data.conid) {
                alert('Please provide either Symbol or ConId.');
                return;
            }
            const submitButton = e.target.querySelector('button');
            submitButton.disabled = true;
            document.body.style.cursor = 'wait';
            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    displayResults(result.contracts);
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                submitButton.disabled = false;
                document.body.style.cursor = 'default';
            }
        });

        function displayResults(contracts) {
            const tbody = document.querySelector('#resultsTable tbody');
            contracts.forEach(contract => {
                // Check if already exists
                const existing = selectedContracts.find(c => c.conid === contract.conid);
                if (!existing) {
                    selectedContracts.push(contract);
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><input type="checkbox" class="contractCheckbox" data-contract='${JSON.stringify(contract)}'></td>
                        <td>${contract.symbol}</td>
                        <td>${contract.conid}</td>
                        <td>${contract.local_symbol || ''}</td>
                        <td>${contract.exchange}</td>
                        <td>${contract.currency}</td>
                        <td>${contract.sec_type}</td>
                        <td>${contract.expiration_date || ''}</td>
                        <td>${contract.strike || ''}</td>
                        <td>${contract.right || ''}</td>
                        <td>${contract.multiplier || ''}</td>
                        <td>${contract.under_conid || ''}</td>
                    `;
                    tbody.appendChild(row);
                }
            });
        }

        document.getElementById('selectAllCheckbox').addEventListener('change', (e) => {
            const checkboxes = document.querySelectorAll('.contractCheckbox');
            checkboxes.forEach(cb => cb.checked = e.target.checked);
        });



        document.getElementById('deleteSelected').addEventListener('click', () => {
            const checkboxes = document.querySelectorAll('.contractCheckbox:checked');
            checkboxes.forEach(cb => {
                const contract = JSON.parse(cb.dataset.contract);
                selectedContracts = selectedContracts.filter(c => c.conid !== contract.conid);
                cb.closest('tr').remove();
            });
        });

        document.getElementById('saveContracts').addEventListener('click', async () => {
            const selected = Array.from(document.querySelectorAll('.contractCheckbox:checked')).map(cb => JSON.parse(cb.dataset.contract));
            if (selected.length === 0) return alert('No contracts selected');
            const response = await fetch('/save_contracts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ selected })
            });
            const result = await response.json();
            if (result.success) {
                alert('Saved to ' + result.file);
            }
        });

        document.getElementById('downloadData').addEventListener('click', () => {
            const selected = Array.from(document.querySelectorAll('.contractCheckbox:checked')).map(cb => JSON.parse(cb.dataset.contract));
            if (selected.length === 0) return alert('No contracts selected');
            showDownloadModal(selected);
        });

        function showDownloadModal(contracts) {
            selectedContracts = contracts;  // Store for submission
            const list = document.getElementById('downloadList');
            list.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];
            contracts.forEach((contract, index) => {
                const div = document.createElement('div');
                div.className = 'mb-3 border p-2 position-relative';
                div.style.fontSize = '12px';
                div.dataset.conid = contract.conid;
                const expiry = contract.expiration_date;
                const defaultEnd = expiry && expiry < today ? expiry : today;
                div.innerHTML = `
                    <button type="button" class="btn-close position-absolute top-0 end-0" style="font-size: 10px;" onclick="removeContract(${index})"></button>
                    <h6>${contract.symbol} (${contract.local_symbol || contract.symbol})</h6>
                    <div class="row">
                        <div class="col">
                            <label>Period</label>
                            <div class="row">
                                <div class="col">
                                    <input type="number" class="form-control form-control-sm periodNumber" value="1" min="1">
                                </div>
                                <div class="col">
                                    <select class="form-control form-control-sm periodUnit">
                                        <option value="days">Days</option>
                                        <option value="weeks">Weeks</option>
                                        <option value="months">Months</option>
                                        <option value="years" selected>Years</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <label>End Date</label>
                            <input type="date" class="form-control form-control-sm endDate" value="${defaultEnd}" required>
                        </div>
                        <div class="col">
                            <label>Bar Size</label>
                            <select class="form-control form-control-sm barSize">
                                <option value="1 min">1 min</option>
                                <option value="1 day" selected>1 day</option>
                            </select>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            new bootstrap.Modal(document.getElementById('downloadModal')).show();
        }

        function removeContract(index) {
            const div = document.querySelectorAll('#downloadList .mb-3')[index];
            const conid = div.dataset.conid;
            selectedContracts = selectedContracts.filter(c => c.conid != conid);
            div.remove();
        }

        document.getElementById('setPeriod').addEventListener('click', () => {
            const periodNumber = document.getElementById('periodNumber').value;
            const periodUnit = document.getElementById('periodUnit').value;
            document.querySelectorAll('#downloadList .mb-3').forEach(div => {
                div.querySelector('.periodNumber').value = periodNumber;
                div.querySelector('.periodUnit').value = periodUnit;
            });
        });

        function toggleExpand(jobKey) {
            if (expandedJobs.has(jobKey)) {
                expandedJobs.delete(jobKey);
            } else {
                expandedJobs.add(jobKey);
            }
            updateProgress(); // Re-render to update state
        }

        document.getElementById('startDownload').addEventListener('click', async () => {
            const contracts = [];
            const today = new Date().toISOString().split('T')[0];
            let hasError = false;
            document.querySelectorAll('#downloadList .mb-3').forEach((div, index) => {
                const endDate = div.querySelector('.endDate').value;
                const barSize = div.querySelector('.barSize').value;
                const periodNumber = parseInt(div.querySelector('.periodNumber').value);
                const periodUnit = div.querySelector('.periodUnit').value;
                if (!endDate || !barSize || !periodNumber || !periodUnit) {
                    alert('All fields must be filled');
                    hasError = true;
                    return;
                }
                if (endDate > today) {
                    alert('End date cannot be in the future');
                    hasError = true;
                    return;
                }
                const expiry = selectedContracts[index].expiration_date;
                if (expiry && endDate > expiry) {
                    alert('End date cannot be after expiry date');
                    hasError = true;
                    return;
                }
                // Calculate start date
                const end = new Date(endDate);
                const start = new Date(end);
                if (periodUnit === 'days') {
                    start.setDate(end.getDate() - periodNumber);
                } else if (periodUnit === 'weeks') {
                    start.setDate(end.getDate() - periodNumber * 7);
                } else if (periodUnit === 'months') {
                    start.setMonth(end.getMonth() - periodNumber);
                } else if (periodUnit === 'years') {
                    start.setFullYear(end.getFullYear() - periodNumber);
                }
                const startDate = start.toISOString().split('T')[0];
                if (startDate >= endDate) {
                    alert('Calculated start date must be before end date');
                    hasError = true;
                    return;
                }
                contracts.push({
                    ...selectedContracts[index],
                    start_date: startDate,
                    end_date: endDate,
                    bar_size: barSize
                });
            });
            if (hasError || contracts.length === 0) {
                return;
            }
            const response = await fetch('/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contracts })
            });
            const result = await response.json();
            activeJobs.push(...result.jobs);
            // Store details for each job
            result.jobs.forEach((job, index) => {
                jobDetails[job.job_key] = {
                    contract: contracts[index],
                    start_date: contracts[index].start_date,
                    end_date: contracts[index].end_date,
                    bar_size: contracts[index].bar_size,
                    submission_time: new Date().toLocaleString([], {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}),
                    start_time: null,
                    completion_time: null
                };
            });
            updateProgress();
            startPolling();
            alert('Download jobs submitted: ' + result.jobs.length + ' jobs');
            bootstrap.Modal.getInstance(document.getElementById('downloadModal')).hide();
        });

        function updateProgress() {
            const area = document.getElementById('progressArea');
            let html = '';
            if (activeJobs.length > 0) {
                html += '<button class="btn btn-secondary btn-sm mb-2" onclick="closeCompleted()">Close Completed</button>';
            }
            html += activeJobs.map(job => {
                let alertClass = 'alert-info';
                const details = job.status || job.error || '';
                if (details.includes('processing')) {
                    alertClass = 'alert-warning';
                } else if (details.includes('completed') && !details.includes('error')) {
                    alertClass = 'alert-success';
                } else if (details.includes('failed') || details.includes('error')) {
                    alertClass = 'alert-danger';
                }
                const jobDetail = jobDetails[job.job_key] || {};
                const localSymbol = jobDetail.contract ? (jobDetail.contract.local_symbol || jobDetail.contract.symbol) : job.contract;
                const statusMsg = details.split(' - ')[0].replace('Status: ', ''); // Show only status part
                const isExpanded = expandedJobs.has(job.job_key);
                return `
                    <div class="alert ${alertClass} position-relative">
                        <button type="button" class="btn-close position-absolute top-0 end-0" style="font-size: 10px;" onclick="closeJob('${job.job_key}')"></button>
                        <strong>${localSymbol}</strong><br>
                        <small>${statusMsg}</small>
                        <span class="position-absolute bottom-0 end-0 mb-1 me-1" style="cursor: pointer; font-size: 14px; color: #6c757d;" onclick="toggleExpand('${job.job_key}')">
                            ${isExpanded ? '▲' : '▼'}
                        </span>
                        <div class="collapse ${isExpanded ? 'show' : ''} mt-2" id="details-${job.job_key}">
                            <div style="font-size: 11px;">
                                <div style="display: table;">
                                    <div style="display: table-row;"><div style="display: table-cell; padding-right: 10px; font-weight: bold;">Job ID</div><div style="display: table-cell;">${job.job_key}</div></div>
                                    <div style="display: table-row;"><div style="display: table-cell; padding-right: 10px; font-weight: bold;">Bar Size</div><div style="display: table-cell;">${jobDetail.bar_size || 'N/A'}</div></div>
                                    <div style="display: table-row;"><div style="display: table-cell; padding-right: 10px; font-weight: bold;">Period</div><div style="display: table-cell;">${jobDetail.start_date || 'N/A'} to ${jobDetail.end_date || 'N/A'}</div></div>
                                    <div style="display: table-row;"><div style="display: table-cell; padding-right: 10px; font-weight: bold;">Submitted</div><div style="display: table-cell;">${jobDetail.submission_time || 'N/A'}</div></div>
                                    <div style="display: table-row;"><div style="display: table-cell; padding-right: 10px; font-weight: bold;">Started</div><div style="display: table-cell;">${jobDetail.start_time || 'N/A'}</div></div>
                                    <div style="display: table-row;"><div style="display: table-cell; padding-right: 10px; font-weight: bold;">Completed</div><div style="display: table-cell;">${jobDetail.completion_time || 'N/A'}</div></div>
                                    <div style="display: table-row;"><div style="display: table-cell; padding-right: 10px; font-weight: bold;">Message</div><div style="display: table-cell;">${details}</div></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            area.innerHTML = html;
        }

        function closeJob(jobKey) {
            const job = activeJobs.find(j => j.job_key === jobKey);
            if (!job) return;
            if (job.status && job.status.includes('processing')) {
                alert('Cannot close processing job');
                return;
            }
            // If pending, cancel in backend
            if (job.status && job.status.includes('pending')) {
                fetch(`/cancel_job/${jobKey}`, {method: 'POST'});
            }
            // Remove from activeJobs
            activeJobs = activeJobs.filter(j => j.job_key !== jobKey);
            delete jobDetails[jobKey];
            updateProgress();
        }

        function closeCompleted() {
            activeJobs = activeJobs.filter(job => {
                if (job.status && job.status.includes('completed')) {
                    delete jobDetails[job.job_key];
                    return false;
                }
                return true;
            });
            updateProgress();
        }

        function startPolling() {
            setInterval(async () => {
                for (let job of activeJobs) {
                    if (job.job_key && !job.error) {
                        const response = await fetch(`/job_status/${job.job_key}`);
                        const status = await response.json();
                        const prevStatus = job.status;
                        job.status = status.details || status.status;
                        // Update times
                        const details = jobDetails[job.job_key];
                        if (details) {
                            if (job.status.includes('processing') && !details.start_time) {
                                details.start_time = new Date().toLocaleString([], {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
                            }
                            if ((job.status.includes('completed') || job.status.includes('failed')) && !details.completion_time) {
                                details.completion_time = new Date().toLocaleString([], {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
                            }
                        }
                    }
                }
                updateProgress();
            }, 5000);  // Poll every 5 seconds
        }
    </script>
</body>
</html>
